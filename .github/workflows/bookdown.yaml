name: bookdown

on:
  push:
    branches:
      - docs/rpkg-usage

permissions:
  contents: write

concurrency:
  group: bookdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout docs branch
        uses: actions/checkout@v4
        with:
          ref: docs/rpkg-usage

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install pak
        run: |
          Rscript -e 'install.packages("pak", repos = sprintf("https://r-lib.github.io/p/pak/stable/%s/%s/%s", .Platform$pkgType, R.Version()$os, R.Version()$arch))'

      - name: Install Bioconductor packages
        run: |
          Rscript -e '
            pak::pkg_install("BiocManager")
            BiocManager::install(c("clusterProfiler", "enrichplot"), update = FALSE, ask = FALSE)
          '

      - name: Install CRAN packages
        run: |
          Rscript -e '
            pak::pkg_install(c(
              "bookdown", "rmarkdown", "knitr",
              "aplot", "dplyr", "forcats", "ggfun", "ggplot2", "ggrepel",
              "igraph", "magrittr", "Matrix", "paletteer", "purrr",
              "RColorBrewer", "rlang", "scales", "tibble", "tidyr", "yulab.utils",
              "ggalluvial", "ggtangle"
            ))
          '

      - name: Install TCMDATA from source
        run: |
          Rscript -e 'install.packages(".", repos = NULL, type = "source")'

      - name: Verify packages
        run: |
          Rscript -e '
            pkgs <- c("TCMDATA", "bookdown", "ggtangle", "ggalluvial", "clusterProfiler", "enrichplot")
            for (p in pkgs) {
              ok <- requireNamespace(p, quietly = TRUE)
              message(sprintf("%s %s: %s", ifelse(ok, "OK", "FAIL"), p, ifelse(ok, packageVersion(p), "NOT INSTALLED")))
              if (!ok) stop(paste("Package not available:", p))
            }
          '

      - name: Build book
        run: |
          cd docs
          Rscript -e '
            output_dir <- file.path(normalizePath(".."), "site")
            bookdown::render_book("index.Rmd", output_format = "bookdown::gitbook", output_dir = output_dir)
          '

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
